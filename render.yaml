services:
  - type: web
    name: gyanuday-dashboard
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python create_superuser.py"
    startCommand: "gunicorn gyan_uday.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: DATABASE_URL
        fromDatabase:
          name: gyanuday-db
          property: connectionString

databases:
  - name: gyanuday-db
    databaseName: gyanuday
    user: gyanuday_user
    plan: free
